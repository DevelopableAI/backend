entities:
  User:
    constraints:
      - "Users can only access their own orders"
      - "Email must be unique"
      - "Password must be at least 8 characters; never returned in any response"
  Order:
    constraints:
      - "Only the owning user can view, update, or delete their orders"
      - "Status must be one of: pending, processing, shipped, delivered, cancelled"
    primary_parent: User
  OrderItem:
    constraints:
      - "Order items are managed through their parent order"
      - "Quantity must be at least 1; unitPrice must be non-negative"
    primary_parent: Order
  Product:
    constraints:
      - "Products are publicly readable; only admins can create/update/delete"
      - "Price must be non-negative; stock must be non-negative"
